<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Piano Quest</title>

<!-- viewport-fit=cover uses the whole screen behind the rounded corners.
     user-scalable=no stops a stray pinch from zooming the keyboard away. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />

<!-- Add to Home Screen: full screen, no Safari chrome, dark status bar -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Piano Quest" />
<meta name="theme-color" content="#1B1327" />
<meta name="description" content="Learn the piano, one note at a time." />

<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" href="./icon-192.png" />
<link rel="stylesheet" href="./fonts.css" />

<style>
  html, body {
    margin: 0; padding: 0;
    background: #1B1327;
    /* no rubber-band bounce while she is playing */
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* respect the notch / home indicator when installed full-screen */
  #root {
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #boot {
    color: #A292B8; font-family: system-ui, sans-serif;
    text-align: center; padding-top: 45vh;
  }
</style>
</head>
<body>
  <div id="root"><div id="boot">Tuning the piano…</div></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
